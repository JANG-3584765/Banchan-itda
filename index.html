<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찬차니 - 우리 동네 반찬 찾기</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" 
            integrity="sha384-lTLG7v9m9K9vG9eM9/61kY/Xv/4t09T7i7u9i4F8zUoD7u5m9z" 
            crossorigin="anonymous"></script>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1018b180a2f2cd1e1b559ae3d503375f&autoload=false"></script>
</head>
<body>
    <header class="header">
        <h1 class="logo">찬차니</h1>
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="shop-search" placeholder="동네 이름이나 반찬 가게 검색">
            </div>
        </div>
        <nav class="nav-menu">
            <a href="#" id="kakao-login-btn" class="nav-item">로그인</a>
            <a href="#" class="nav-item">찜 목록 <span class="wish-count">0</span></a>
        </nav>
    </header>

    <main class="main-container">
        <aside class="sidebar">
            <section class="filter-section">
                <button class="filter-tag active" data-filter="all">#전체</button>
                <button class="filter-tag" data-filter="저염식">#저염식</button>
                <button class="filter-tag" data-filter="아이반찬">#아이반찬</button>
                <button class="filter-tag" data-filter="자취생소분">#자취생소분</button>
            </section>
            
            <div class="list-header">
                <span class="total-count">주변 가게 <strong id="store-num">0</strong>곳</span>
                <select class="sort-select">
                    <option>추천순</option>
                    <option>거리순</option>
                    <option>리뷰순</option>
                </select>
            </div>

            <div class="shop-list" id="shop-list-container">
                <div class="loading-state">가게 정보를 불러오고 있습니다...</div>
            </div>
        </aside>

        <section id="map-container">
            <div id="map">
                <div class="map-placeholder">
                    <p>지도를 로딩 중입니다...</p>
                </div>
            </div>
            <button class="btn-current-loc">내 위치로</button>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 찬차니. All rights reserved.</p>
    </footer>

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1018b180a2f2cd1e1b559ae3d503375f&autoload=false"></script>

    <script src="script.js"></script>
</body>
</html>
